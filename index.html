<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CalcGPT</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="calculator">
    <header class="calculator__header">
      <h1>CalcGPT</h1>
      <p>Fast, clean calculator</p>
    </header>

    <div class="display" id="display">0</div>

    <div class="keypad">
      <button class="key key--action" data-action="clear">C</button>
      <button class="key key--action" data-action="delete">DEL</button>
      <button class="key key--action" data-action="percent">%</button>
      <button class="key key--operator" data-value="/">÷</button>

      <button class="key" data-value="7">7</button>
      <button class="key" data-value="8">8</button>
      <button class="key" data-value="9">9</button>
      <button class="key key--operator" data-value="*">×</button>

      <button class="key" data-value="4">4</button>
      <button class="key" data-value="5">5</button>
      <button class="key" data-value="6">6</button>
      <button class="key key--operator" data-value="-">−</button>

      <button class="key" data-value="1">1</button>
      <button class="key" data-value="2">2</button>
      <button class="key" data-value="3">3</button>
      <button class="key key--operator" data-value="+">+</button>

      <button class="key key--wide" data-value="0">0</button>
      <button class="key" data-value=".">.</button>
      <button class="key key--equals" data-action="calculate">=</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
